{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Account{% endblock %} | Project X</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <script src="{% static 'js/main.js' %}" defer></script>
</head>
<body>
    <header class="site-header">
        <a class="brand" href="{% url 'home' %}">
            <img src="{% static 'img/project-x-logo.svg' %}" alt="" class="brand-logo">
            <span>Project X</span>
        </a>
        <div class="header-actions">
            <div class="theme-switcher" aria-label="Theme switcher">
                <button class="theme-option active" type="button" data-theme="light">Light</button>
                <button class="theme-option" type="button" data-theme="dark">Dark</button>
                <button class="theme-option" type="button" data-theme="techy">Techy</button>
            </div>
            <nav class="site-nav" aria-label="Account navigation">
                <a href="{% url 'home' %}">Home</a>
                <a href="{% url 'login' %}">Login</a>
                <a href="{% url 'signup' %}">Sign Up</a>
            </nav>
        </div>
    </header>

    <main class="auth-main">
        <section class="auth-panel">
            {% block content %}{% endblock %}
        </section>
    </main>
</body>
</html>
